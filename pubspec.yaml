name: church_arena
description: A church quiz competition application featuring question banks, buzzer support, team scoreboards, and real-time match management.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5
  go_router: ^13.2.0
  get_it: ^7.6.7
  injectable: ^2.3.2
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.9.0
  path_provider: ^2.1.2
  flutter_libserialport: ^0.6.0
  just_audio: ^0.9.36
  file_picker: ^8.0.0+1
  excel: ^4.0.2
  csv: ^6.0.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  dartz: ^0.10.1
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  window_manager: ^0.3.8
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/images/Banners/
